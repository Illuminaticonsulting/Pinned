name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ── Lint & Type-check ────────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

  # ── Server Tests ─────────────────────────────────────────────────────
  test-server:
    name: Test Server
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: pinned_test
          POSTGRES_USER: pinned
          POSTGRES_PASSWORD: pinned_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pinned -d pinned_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://pinned:pinned_test@localhost:5432/pinned_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-jwt-secret
      JWT_REFRESH_SECRET: ci-test-refresh-secret
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        run: pnpm db:migrate

      - name: Run server tests
        run: pnpm --filter @pinned/server test -- --coverage --ci

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-coverage
          path: packages/server/coverage/

  # ── Chart Engine Tests ──────────────────────────────────────────────
  test-chart-engine:
    name: Test Chart Engine
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run chart engine tests
        run: pnpm --filter @pinned/chart-engine test -- --ci

  # ── AI Service Tests ────────────────────────────────────────────────
  test-ai-service:
    name: Test AI Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ai-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: packages/ai-service/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install pytest pytest-cov

      - name: Run pytest
        run: pytest --tb=short -q

  # ── Build ───────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test-server, test-chart-engine]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Build Docker images
        run: |
          docker build -t pinned-server:${{ github.sha }} -f packages/server/Dockerfile .
          docker build -t pinned-ai:${{ github.sha }} -f packages/ai-service/Dockerfile .

  # ── Deploy Staging (main only) ──────────────────────────────────────
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build]
    permissions:
      packages: write
      contents: read
    env:
      REGISTRY: ghcr.io
      IMAGE_PREFIX: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push server image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/server:staging -f packages/server/Dockerfile .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/server:staging

      - name: Build & push AI service image
        run: |
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ai-service:staging -f packages/ai-service/Dockerfile .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/ai-service:staging

      - name: Deploy to staging
        run: |
          echo "🚀 Staging deployment placeholder"
          echo "Add your deployment commands here, e.g.:"
          echo "  - kubectl set image deployment/server server=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/server:staging"
          echo "  - railway up"
          echo "  - fly deploy"
